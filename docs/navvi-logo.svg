<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <!-- Glow -->
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a5f3fc" stop-opacity="0.6"/>
      <stop offset="70%" stop-color="#67e8f9" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#67e8f9" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
  </defs>
  <!-- Outer glow -->
  <circle cx="60" cy="60" r="50" fill="url(#glow)"/>
  <!-- Wings -->
  <ellipse cx="42" cy="52" rx="18" ry="28" fill="#a5f3fc" opacity="0.5" transform="rotate(-15 42 52)" filter="url(#blur)"/>
  <ellipse cx="78" cy="52" rx="18" ry="28" fill="#a5f3fc" opacity="0.5" transform="rotate(15 78 52)" filter="url(#blur)"/>
  <!-- Body -->
  <ellipse cx="60" cy="60" rx="8" ry="14" fill="#22d3ee"/>
  <!-- Core light -->
  <ellipse cx="60" cy="56" rx="4" ry="5" fill="#ecfeff"/>
  <!-- Eyes -->
  <circle cx="57" cy="54" r="1.5" fill="#164e63"/>
  <circle cx="63" cy="54" r="1.5" fill="#164e63"/>
</svg>
